name: credit_calc
description: CreditCalc — app ufficiale CreditCore per mobile e desktop (store).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.0.0
  firebase_storage: ^13.0.6
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  flutter_markdown: ^0.7.7+1
  file_picker: ^10.1.9
  http: ^1.4.0
  record: ^6.0.0
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  webview_flutter: ^4.13.0
  web_socket_channel: ^3.0.3
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  credit_calc_core:
    git:
      url: https://github.com/Marcellodinapoli/credit-calc-core.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 256
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
